<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DÉTOPIA — Aperçu Visuel des Cartes</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d0d18;
    color: #eee;
    font-family: 'Segoe UI', system-ui, sans-serif;
    padding: 32px 24px 64px;
  }
  h1 {
    text-align: center;
    font-size: 22px;
    letter-spacing: 6px;
    color: #88aaff;
    margin-bottom: 8px;
    text-transform: uppercase;
  }
  .subtitle {
    text-align: center;
    color: #444;
    font-size: 12px;
    letter-spacing: 2px;
    margin-bottom: 48px;
  }

  /* ── Rarity legend ─────────────────────────── */
  .legend {
    display: flex;
    gap: 20px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 48px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: #888;
  }
  .legend-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    border: 2px solid;
  }

  /* ── Section ───────────────────────────────── */
  .section {
    margin-bottom: 56px;
  }
  .section-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid #1a1a2e;
  }
  .section-swatch {
    width: 16px;
    height: 40px;
    border-radius: 4px;
  }
  .section-title {
    font-size: 14px;
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 700;
  }
  .section-count {
    font-size: 11px;
    color: #444;
    margin-left: auto;
  }

  /* ── Card grid ─────────────────────────────── */
  .card-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
  }

  /* ── Card ──────────────────────────────────── */
  .card {
    width: 140px;
    height: 140px;
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    cursor: default;
    transition: transform 0.15s, box-shadow 0.15s;
    position: relative;
  }
  .card:hover {
    transform: translateY(-4px) scale(1.04);
    z-index: 10;
  }
  .card.rarity-common  { box-shadow: 0 2px 8px rgba(0,0,0,0.5); border: 2px solid rgba(180,180,180,0.25); }
  .card.rarity-uncommon{ box-shadow: 0 2px 12px rgba(68,136,255,0.4); border: 2px solid #4488ff; }
  .card.rarity-rare    { box-shadow: 0 2px 16px rgba(160,80,255,0.5); border: 2px solid #a050ff; }
  .card.rarity-legendary { box-shadow: 0 0 20px rgba(255,220,0,0.6), 0 2px 12px rgba(0,0,0,0.5); border: 3px solid #ffdd00; }

  .card-art {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .card-art::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.12);
  }
  .card-icon {
    font-size: 44px;
    line-height: 1;
    filter: grayscale(1) brightness(0.08) contrast(3);
    position: relative;
    z-index: 1;
    transition: filter 0.15s;
  }
  .card:hover .card-icon {
    filter: grayscale(0) brightness(1) contrast(1);
  }
  .card-rarity-gem {
    position: absolute;
    top: 6px;
    right: 7px;
    font-size: 7px;
    opacity: 0.7;
  }
  .card-cost {
    position: absolute;
    top: 5px;
    left: 7px;
    font-size: 8px;
    font-weight: 700;
    color: rgba(0,0,0,0.55);
    letter-spacing: 0.5px;
  }

  .card-body {
    height: 48px;
    background: rgba(0,0,0,0.82);
    padding: 5px 8px 4px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .card-name {
    font-size: 9px;
    font-weight: 700;
    color: #fff;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.2;
  }
  .card-desc {
    font-size: 7.5px;
    color: rgba(255,255,255,0.42);
    line-height: 1.3;
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 3px;
  }
  .card-type {
    font-size: 7px;
    color: rgba(255,255,255,0.3);
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .card-gold {
    font-size: 7px;
    color: rgba(255,200,50,0.55);
  }

  /* ── Tooltip on hover ──────────────────────── */
  .card[data-desc]:hover::after {
    content: attr(data-desc);
    position: absolute;
    bottom: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%);
    width: 180px;
    background: #111122;
    color: #cce;
    border: 1px solid #3344aa;
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 9.5px;
    line-height: 1.5;
    z-index: 100;
    pointer-events: none;
    white-space: normal;
    box-shadow: 0 4px 16px rgba(0,0,20,0.8);
  }

  /* ── Print ─────────────────────────────────── */
  @media print {
    body { background: white; color: black; padding: 16px; }
    .card { break-inside: avoid; }
    .card:hover { transform: none; }
    .card-icon { filter: grayscale(1) brightness(0.1) contrast(3); }
    .card-body { background: #222; }
    h1 { color: #334; }
  }
</style>
</head>

  let r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);

function renderCard(card, catColor) {
  const dark = darken(catColor, 50);
  const gemColors = { common: 'rgba(220,220,220,0.5)', uncommon: '#4488ff', rare: '#a050ff', legendary: '#ffdd00' };
  return `
    <div class="card rarity-${card.r}"
         style="--cat-color:${catColor};"
         data-desc="${card.desc.replace(/"/g,'&quot;')}">
      <div class="card-art" style="background:linear-gradient(145deg,${catColor},${dark})">
        <span class="card-cost">${card.r === 'legendary' ? '★' : card.r === 'rare' ? '◆◆' : card.r === 'uncommon' ? '◆' : '·'}</span>
        <span class="card-icon">${card.icon}</span>
      </div>
      <div class="card-body">
        <div class="card-name">${card.name}</div>
        <div class="card-desc">${card.desc}</div>
      </div>
    </div>`;
}

function renderSection(section) {
  const cards = section.cards.map(c => renderCard(c, section.color)).join('');
  return `
    <div class="section">
      <div class="section-header">
        <div class="section-swatch" style="background:${section.color}"></div>
        <div>
          <div class="section-title" style="color:${section.color}">${section.label}</div>
          <div style="font-size:10px;color:#555;margin-top:3px">${section.desc}</div>
        </div>
        <div class="section-count">${section.cards.length} carte${section.cards.length > 1 ? 's' : ''}</div>
      </div>
      <div class="card-grid">${cards}</div>
    </div>`;
}

document.getElementById('app').innerHTML = SECTIONS.map(renderSection).join('');
