name: Deploy Détopia to GitHub Pages

on:
  push:
    branches: [main]
    paths: [card-rpg/**]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: card-rpg/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: card-rpg

      - name: Build
        run: npm run build
        working-directory: card-rpg

      - uses: actions/upload-pages-artifact@v3
        with:
          path: card-rpg/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/configure-pages@v5
      - id: deployment
        uses: actions/deploy-pages@v4
